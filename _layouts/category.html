---
layout: default
---
<ul class="post-list">
    {% assign category = page.title %}
    {% for post in site.categories[category] %}
    <li>
        <h3>
        <a href="{{ site.baseurl }}{{ post.url }}">
            {{ post.title }}
        </a>
        <span class="post-meta">{{ post.date | date: date_format }}</span>
        </h3>
    </li>
    {% endfor %}
</ul>
